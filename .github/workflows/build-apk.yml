name: Build PrimeYard Workspace APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android platform files with correct package
        run: flutter create . --platforms=android --org com.primeyard

      - name: Add Firebase Android config
        run: cp google-services.json android/app/google-services.json

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: primeyard-workspace-flutter-apk
          path: build/app/outputs/flutter-apk/app-release.apk
